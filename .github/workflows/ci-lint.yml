name: ci-lint
on:
  push: { branches: [main] }
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Memory-schema lint moved to the vault repo (SchnappAPI/schnapp-vault
      # vault-freshness.yml) when the memory lane moved there; this repo lints style.
      - name: writing-style gate (no em dashes in live files)
        run: bash scripts/check-writing-style.sh
