name: freshness

# Freshness + secrets gate. Fails the push/PR on any of:
#  - a generated doc is out of date (a component/source file changed but the generator was
#    not re-run), or a `last-verified:` doc points at a source that changed after its date;
#  - a literal secret value appears in a tracked file (scan-secrets.sh - the leak guard);
#  - the secret scanner regresses (its fixture self-test fails);
#  - an op:// reference names an item not documented in credentials-map.md (WARN-only for now).
# Runs on GitHub-hosted ubuntu (Mac-independent, the whole point of schnapp-os).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so last-verified source-date checks can read git log

      - name: Documentation freshness gate
        run: bash scripts/check-freshness.sh

      - name: Secret scanner self-test
        run: bash scripts/tests/test-scan-secrets.sh

      - name: Supersede-orphan detector self-test
        run: bash scripts/tests/test-supersede-orphans.sh

      - name: Frontmatter lib self-test
        run: bash scripts/tests/test-lib-frontmatter.sh

      - name: Writing-style gate self-test
        run: bash scripts/tests/test-check-writing-style.sh

      - name: Stale-facts detector self-test
        run: bash scripts/tests/test-stale-facts.sh

      - name: Capture-enqueue self-test
        run: bash scripts/tests/test-capture-enqueue.sh

      - name: Open-questions surfacing self-test
        run: bash scripts/tests/test-open-questions.sh

      - name: Learning-worker self-test
        run: bash scripts/tests/test-learning-worker.sh

      - name: Learning-recurrence self-test
        run: bash scripts/tests/test-learning-recurrence.sh

      - name: Learning-worker recurrence live-path self-test
        run: bash scripts/tests/test-learning-worker-recurrence-live.sh

      - name: Learning-eval self-test
        run: bash scripts/tests/test-learning-eval.sh

      - name: Learning-gate self-test
        run: bash scripts/tests/test-learning-gate.sh

      - name: Learning-distill routing self-test
        run: bash scripts/tests/test-learning-distill.sh

      - name: Learning-worker vault-leg live-path self-test
        run: bash scripts/tests/test-learning-worker-vault-live.sh

      - name: Infra-health probe self-test
        run: bash scripts/tests/test-infra-health.sh

      - name: Length-advisory self-test
        run: bash scripts/tests/test-length-advisory.sh

      - name: Write-hook JSON-extraction self-test
        run: bash scripts/tests/test-write-hook-json-extract.sh

      - name: Force-push guard self-test
        run: bash scripts/tests/test-no-force-push-guard.sh

      - name: Secret-bytes gate self-test
        run: bash scripts/tests/test-check-secret-bytes.sh

      - name: Vault-autocommit self-test
        run: bash scripts/tests/test-vault-autocommit.sh

      - name: Assemble-context self-test
        run: bash scripts/tests/test-assemble-context.sh

      - name: Internal link check (live docs)
        run: bash scripts/check-links.sh

      - name: Link-check self-test
        run: bash scripts/tests/test-check-links.sh

      - name: LaunchAgent plists are valid
        run: python3 -c "import plistlib; [plistlib.load(open(p,'rb')) for p in ['scheduled-tasks/com.schnapp.memory-consolidation.plist','scheduled-tasks/com.schnapp.infra-health.plist','scheduled-tasks/com.schnapp.vault-autocommit.plist']]; print('plists OK')"

      - name: Secret scan (no literal values in tracked files)
        run: bash scripts/scan-secrets.sh --exclude 'scripts/tests/*'

      - name: op:// reference check
        run: bash scripts/check-op-refs.sh
