name: freshness

# Freshness + secrets gate. Fails the push/PR on any of:
#  - a generated doc is out of date (a source under plugins/core/ changed but the generator was
#    not re-run), or a `last-verified:` doc points at a source that changed after its date;
#  - a literal secret value appears in a tracked file (scan-secrets.sh — the leak guard);
#  - the secret scanner regresses (its fixture self-test fails);
#  - an op:// reference names an item not documented in credentials-map.md (WARN-only for now).
# Runs on GitHub-hosted ubuntu (Mac-independent, the whole point of schnapp-os).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so last-verified source-date checks can read git log

      - name: Documentation freshness gate
        run: bash plugins/core/scripts/check-freshness.sh

      - name: Secret scanner self-test
        run: bash plugins/core/scripts/tests/test-scan-secrets.sh

      - name: Supersede-orphan detector self-test
        run: bash plugins/core/scripts/tests/test-supersede-orphans.sh

      - name: Frontmatter lib self-test
        run: bash plugins/core/scripts/tests/test-lib-frontmatter.sh

      - name: Memory frontmatter detector self-test
        run: bash plugins/core/scripts/tests/test-memory-frontmatter.sh

      - name: Stale-facts detector self-test
        run: bash plugins/core/scripts/tests/test-stale-facts.sh

      - name: Self-edit stager self-test
        run: bash plugins/core/scripts/tests/test-self-edit-stage.sh

      - name: Capture-enqueue self-test
        run: bash plugins/core/scripts/tests/test-capture-enqueue.sh

      - name: Learning-worker self-test
        run: bash plugins/core/scripts/tests/test-learning-worker.sh

      - name: LaunchAgent plist is valid XML
        run: xmllint --noout scheduled-tasks/com.schnapp.memory-consolidation.plist

      - name: Secret scan (no literal values in tracked files)
        run: bash plugins/core/scripts/scan-secrets.sh --exclude 'plugins/core/scripts/tests/*'

      - name: op:// reference check
        run: bash plugins/core/scripts/check-op-refs.sh
