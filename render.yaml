# Render Blueprint — deploys the off-Mac 1Password connector (connectors/op-mcp/)
# to a free Render web service. One-click: Render dashboard > New > Blueprint,
# point at this repo, it reads this file. Then set the two secrets when prompted.
# Full runbook (host + Cloudflare OAuth front + claude.ai registration):
#   connectors/op-mcp/DEPLOY.md   (canonical; decisions/0004)
#
# Why Render: free tier, no CLI, no Docker knowledge needed (Render builds the
# Dockerfile straight from the repo). Caveat: the free tier sleeps after ~15 min
# idle, so the first call after idle cold-starts in ~30-60s. Acceptable for an
# occasional secret resolver. Confirm current free-tier terms at signup.
services:
  - name: op-mcp
    type: web
    runtime: docker
    plan: free
    # rootDir scopes the build to the connector dir; with it set, dockerfilePath
    # and dockerContext are relative to rootDir (NOT the repo root — a doubled
    # path like connectors/op-mcp/connectors/op-mcp fails the build).
    rootDir: connectors/op-mcp
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      # Set both in the Render dashboard at Blueprint creation (sync:false = prompt,
      # never stored in the repo). OP_SERVICE_ACCOUNT_TOKEN = the 1Password Service
      # Account token; OP_MCP_BEARER = a random bearer, e.g. `openssl rand -hex 32`
      # (save it into 1Password after). The server refuses to start if either is missing.
      - key: OP_SERVICE_ACCOUNT_TOKEN
        sync: false
      - key: OP_MCP_BEARER
        sync: false
